# T-Ride frontend container nginx — SPA + optional same-origin /api/ proxy
# Smoke test uses split ports (frontend :3101, backend :3100); proxy kept for future ktaxi-nginx phase.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50m;

    error_page 413 = /upload-too-large.json;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /api/ {
        proxy_pass http://tride-backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Guest-Access-Token $http_x_guest_access_token;
        proxy_read_timeout 60s;
    }

    location /socket.io/ {
        proxy_pass http://tride-backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 75s;
    }

    location = /upload-too-large.json {
        internal;
        default_type application/json;
        add_header Cache-Control "no-store";
        return 413 '{"success":false,"error_code":"FILE_TOO_LARGE","code":"FILE_TOO_LARGE","message":"Uploaded files are too large"}';
    }

    location = /index.html {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|webp|svg|ico|wasm|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
