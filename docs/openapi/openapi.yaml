openapi: 3.1.0
info:
  title: T-Ride Platform API
  version: 1.0.0
  description: |
    Thailand Travel Platform — Airport Transfer & future travel services.
    Aligns with Database Design v1.1 and API Contract v1.0.
    Base path `/api/v1`. JWT Bearer authentication.
  contact:
    name: T-Ride API Support
    email: support@ttaxi.com

jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base

servers:
  - url: https://api.ttaxi.com/api/v1
    description: Production
  - url: http://localhost:3000/api/v1
    description: Local development

tags:
  - name: Authentication
    description: Register, login, token refresh
  - name: Customer
    description: Customer profile and bookings
  - name: Booking
    description: Reservations, pricing, vehicle recommendation
  - name: Driver
    description: Driver app — assignments, location, status
  - name: Vehicle
    description: Vehicle types and pricing
  - name: Airport
    description: Airport master data
  - name: Golf
    description: Golf courses and regions
  - name: Chat
    description: Chat rooms and messages
  - name: Notification
    description: Push and in-app notifications
  - name: Admin
    description: Admin panel operations
  - name: Settings
    description: Public and admin settings
  - name: Translation
    description: i18n bundles
  - name: Proxy
    description: Google Places and flight lookup proxies
  - name: Health
    description: Service health check

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns API availability and version. No authentication required.
      security: []
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseHealth'
              examples:
                ok:
                  value:
                    success: true
                    message: OK
                    data:
                      status: ok
                      version: 1.0.0
                      timestamp: '2026-07-01T10:00:00+07:00'

  /health/readiness:
    get:
      tags: [Health]
      summary: Readiness check
      description: Returns non-sensitive readiness checks for staging operations. Optional integrations are reported but do not fail readiness.
      security: []
      operationId: getReadiness
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseReadiness'
        '503':
          description: Required dependency is degraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseReadiness'

  /auth/register:
    post:
      tags: [Authentication]
      summary: Register customer
      description: Create a new CUSTOMER account and return JWT tokens.
      security: []
      operationId: authRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              default:
                value:
                  email: user@example.com
                  password: secret123
                  name: Kim Traveler
                  phone: '+821012345678'
                  countryCode: KR
                  locale: ko
      responses:
        '201':
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthToken'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/DuplicateError'

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login
      description: Authenticate Customer, Driver, or Admin and return JWT tokens.
      security: []
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              customer:
                value:
                  email: user@example.com
                  password: secret123
              driverPhone:
                value:
                  phone: '+66123456789'
                  password: secret123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthToken'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token
      security: []
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRefreshToken'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Logout
      description: Invalidate refresh token session.
      operationId: authLogout
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessEmpty'

  /auth/me:
    get:
      tags: [Authentication]
      summary: Get current user
      operationId: authMe
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /customer/profile:
    get:
      tags: [Customer]
      summary: Get customer profile
      operationId: getCustomerProfile
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCustomerProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      tags: [Customer]
      summary: Update customer profile
      operationId: updateCustomerProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerProfileRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCustomerProfile'
        '400':
          $ref: '#/components/responses/ValidationError'

  /customer/bookings:
    get:
      tags: [Customer]
      summary: List my bookings
      operationId: listCustomerBookings
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ReservationStatus'
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingSummaryPagination'

  /bookings/vehicle/recommend:
    post:
      tags: [Booking]
      summary: Recommend vehicle
      description: Calculate recommended vehicle type from passengers and luggage (PRD rules).
      security: []
      operationId: recommendVehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleRecommendationRequest'
            examples:
              family:
                value:
                  adults: 2
                  children: 1
                  infants: 0
                  carriers20Inch: 2
                  carriers24InchPlus: 1
                  golfBags: 0
      responses:
        '200':
          description: Recommendation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVehicleRecommendation'
              examples:
                suv:
                  value:
                    success: true
                    message: OK
                    data:
                      recommendedVehicleType: SUV
                      vehicleCount: 1
                      multiVehicle: false
                      assignments:
                        - vehicleType: SUV
                          count: 1
                      selectableVehicleTypes:
                        - SUV
                        - VIP_SUV
                        - VAN
        '400':
          $ref: '#/components/responses/ValidationError'

  /bookings/pricing/calculate:
    post:
      tags: [Booking]
      summary: Calculate booking price
      description: Preview charge line items and total before creating booking.
      security: []
      operationId: calculateBookingPrice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PricingCalculateRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePricingResult'
        '422':
          $ref: '#/components/responses/VehicleNotSelectable'

  /bookings:
    post:
      tags: [Booking]
      summary: Create booking
      description: |
        Creates booking, charge items, chat room, activity log.
        Server generates `bookingNumber` (TXYYYYMMDD0001). Client must not generate it.
      security: []
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
            examples:
              airportPickup:
                $ref: '#/components/examples/BookingRequestAirportPickup'
      responses:
        '201':
          description: Booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingCreated'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/DuplicateBooking'
        '422':
          $ref: '#/components/responses/VehicleNotSelectable'
    get:
      tags: [Booking]
      summary: List bookings
      description: Scoped by role — Customer own, Driver assigned, Admin all.
      operationId: listBookings
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            type: string
          description: Single or comma-separated ReservationStatus
        - name: serviceTypeCode
          in: query
          schema:
            $ref: '#/components/schemas/ServiceType'
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          schema:
            type: string
            format: date
        - name: customerEmail
          in: query
          schema:
            type: string
            format: email
          description: Admin only
        - name: driverId
          in: query
          schema:
            type: integer
            format: int64
          description: Admin only
        - name: search
          in: query
          schema:
            type: string
          description: Admin — bookingNumber, name, phone
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingSummaryPagination'

  /bookings/{bookingNumber}:
    get:
      tags: [Booking]
      summary: Get booking detail
      deprecated: true
      description: >
        Not implemented in MVP. Use booking-scoped endpoints under
        /bookings/{bookingNumber}/ (notifications, chat, review, dropoff QR).
        Guest tokens must use X-Guest-Access-Token header, not URL query.
      operationId: getBooking
      security:
        - bearerAuth: []
        - guestBookingAccess: []
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
        - name: email
          in: query
          schema:
            type: string
            format: email
          description: Guest access
        - name: guestAccessToken
          in: query
          schema:
            type: string
          description: Guest access token from create response
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingResponse'
        '403':
          $ref: '#/components/responses/BookingNotAccessible'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Booking]
      summary: Update booking
      description: Limited fields. Customer only when PENDING; Admin broader access.
      operationId: updateBooking
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingUpdateRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingResponse'
        '409':
          $ref: '#/components/responses/InvalidStatusTransition'

  /bookings/{bookingNumber}/dropoff-qr/issue:
    post:
      tags: [Booking]
      summary: Issue customer dropoff QR
      description: >
        Requires authenticated customer ownership or a valid guestAccessToken in
        the JSON body. Booking must be PICKED_UP. Each successful issue returns
        a new raw dropoff QR token, stores only its hash, and invalidates any
        previously issued unused dropoff QR token.
      operationId: issueDropoffQr
      security:
        - bearerAuth: []
        - guestBookingAccess: []
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DropoffQrIssueRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDropoffQrIssue'
        '403':
          $ref: '#/components/responses/BookingNotAccessible'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/InvalidStatusTransition'

  /bookings/{bookingNumber}/review:
    get:
      tags: [Booking]
      summary: Get review eligibility and submitted review
      description: >
        Requires authenticated customer JWT (Bearer) or guest access via
        X-Guest-Access-Token header. Never send guest tokens in URL path or
        query parameters. Exactly one review per booking. Booking number alone
        without authorization returns 403. Customer responses never include
        hiddenReason or reviewer identity.
      operationId: getBookingReview
      security:
        - bearerAuth: []
        - guestReviewAccessHeader: []
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingReviewState'
        '403':
          $ref: '#/components/responses/BookingNotAccessible'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Booking]
      summary: Submit booking review
      description: >
        Booking must be COMPLETED with an assigned driver. Authenticated
        customers use JWT Bearer. Guests pass guestAccessToken in the JSON
        request body only (never in URL). Rating integer 1-5. Comment optional,
        max 500 characters. Duplicate submission returns REVIEW_ALREADY_SUBMITTED.
        driverId and moderation fields are server-derived and cannot be set by
        the client.
      operationId: submitBookingReview
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitReviewRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingReviewState'
        '400':
          description: INVALID_RATING or comment validation error
        '403':
          $ref: '#/components/responses/BookingNotAccessible'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: REVIEW_NOT_ELIGIBLE or REVIEW_ALREADY_SUBMITTED

  /bookings/{bookingNumber}/notifications:
    get:
      tags: [Booking]
      summary: List booking-scoped notifications
      description: >
        Authenticated customer owner or guest via X-Guest-Access-Token header.
        Guest access returns only notifications for this booking.
      operationId: listBookingNotifications
      security:
        - bearerAuth: []
        - guestReviewAccessHeader: []
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
        - name: unreadOnly
          in: query
          schema:
            type: boolean
        - name: notificationType
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedNotificationList'
        '403':
          $ref: '#/components/responses/BookingNotAccessible'

  /bookings/{bookingNumber}/chat:
    get:
      tags: [Booking]
      summary: Get booking chat room
      description: >
        Customer owner, guest (X-Guest-Access-Token header), assigned driver, or admin.
        Terminal bookings (COMPLETED, CANCELLED, NO_SHOW) remain readable but read-only for sending.
      operationId: getBookingChatRoom
      security:
        - bearerAuth: []
        - guestReviewAccessHeader: []
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseChatRoom'
        '403':
          description: CHAT_NOT_ACCESSIBLE

  /bookings/{bookingNumber}/chat/messages:
    get:
      tags: [Booking]
      summary: List booking chat messages
      operationId: listBookingChatMessages
      security:
        - bearerAuth: []
        - guestReviewAccessHeader: []
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
        - name: cursor
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            maximum: 100
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseChatMessageList'
    post:
      tags: [Booking]
      summary: Send booking chat message
      description: >
        Plain text only, max 2000 characters. clientMessageId is required for idempotent retries.
      operationId: sendBookingChatMessage
      security:
        - bearerAuth: []
        - guestReviewAccessHeader: []
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatSendMessageRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseChatMessage'
        '409':
          description: CHAT_READ_ONLY

  /bookings/{bookingNumber}/chat/read:
    post:
      tags: [Booking]
      summary: Mark booking chat messages read up to message ID
      operationId: markBookingChatRead
      security:
        - bearerAuth: []
        - guestReviewAccessHeader: []
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatMarkReadRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseChatReadState'

  /customer/notifications:
    get:
      tags: [Customer]
      summary: List authenticated customer notifications
      operationId: listCustomerNotifications
      security:
        - bearerAuth: []
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
        - name: notificationType
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedNotificationList'
  /customer/notifications/unread-count:
    get:
      tags: [Customer]
      summary: Customer unread notification count
      operationId: customerNotificationUnreadCount
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUnreadCount'
  /customer/notifications/read-all:
    post:
      tags: [Customer]
      summary: Mark all customer notifications read
      operationId: customerNotificationsReadAll
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMarkAllRead'
  /customer/notifications/{notificationId}/read:
    post:
      tags: [Customer]
      summary: Mark customer notification read
      operationId: customerNotificationRead
      security:
        - bearerAuth: []
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseNotificationRead'

  /bookings/{bookingNumber}/cancel:
    post:
      tags: [Booking]
      summary: Cancel booking
      operationId: cancelBooking
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelBookingRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingResponse'
        '409':
          $ref: '#/components/responses/InvalidStatusTransition'

  /bookings/{bookingNumber}/status:
    patch:
      tags: [Booking]
      summary: Change booking status
      description: State machine enforced. See ReservationStatus transitions in API docs.
      operationId: changeBookingStatus
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingStatusChangeRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingResponse'
        '409':
          $ref: '#/components/responses/InvalidStatusTransition'

  /bookings/{bookingNumber}/charges:
    get:
      tags: [Booking]
      summary: Get charge line items
      operationId: getBookingCharges
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseChargeItems'
    post:
      tags: [Booking]
      summary: Add charge line item
      description: Admin only — toll, driver extra, etc.
      operationId: addBookingCharge
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChargeItemCreateRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseChargeItemCreated'

  /bookings/{bookingNumber}/activity-logs:
    get:
      tags: [Booking]
      summary: Get booking activity logs
      description: Admin only — CS audit trail.
      operationId: getBookingActivityLogs
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseActivityLogList'

  /bookings/{bookingNumber}/status-logs:
    get:
      tags: [Booking]
      summary: Get status change history
      operationId: getBookingStatusLogs
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStatusLogList'

  /driver/online:
    post:
      tags: [Driver]
      summary: Set driver online
      description: Authenticated DRIVER only. Sets work status online without requiring GPS.
      operationId: driverOnline
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverStatus'
        '409':
          description: Driver suspended or settlement blocked

  /driver/offline:
    post:
      tags: [Driver]
      summary: Set driver offline
      description: Authenticated DRIVER only. Rejected with 409 while an active trip is assigned.
      operationId: driverOffline
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverStatus'
        '409':
          description: Active job conflict

  /driver/status:
    get:
      tags: [Driver]
      summary: Get driver online status
      operationId: driverStatus
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverStatus'

  /driver/location:
    post:
      tags: [Driver]
      summary: Send driver location
      description: Heartbeat recommended every 10–30 seconds.
      operationId: driverLocation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverLocationRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverLocationAck'

  /driver/assignments:
    get:
      tags: [Driver]
      summary: List driver assignments
      operationId: listDriverAssignments
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            type: string
            default: active
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverAssignmentPagination'

  /driver/bookings/today:
    get:
      tags: [Driver]
      summary: List today's assigned driver bookings
      description: Returns active bookings assigned to the authenticated DRIVER for the current Thailand service day.
      operationId: driverListTodayBookings
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverJobsToday'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /driver/bookings/{bookingNumber}:
    get:
      tags: [Driver]
      summary: Get assigned driver booking detail
      description: The authenticated DRIVER may only access active bookings assigned to that driver.
      operationId: driverGetBookingDetail
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverBookingDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /driver/bookings/{bookingNumber}/accept:
    post:
      tags: [Driver]
      summary: Accept an assigned booking
      description: |
        Accepts the authenticated driver's active assignment when the booking is
        DRIVER_ASSIGNED and the assignment is ASSIGNED. Repeating the request for
        the same already ACCEPTED assignment is an idempotent success and does not
        change acceptedAt. The booking status remains DRIVER_ASSIGNED.
      operationId: driverAcceptAssignedBooking
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      responses:
        '200':
          description: Booking assignment accepted or already accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverBookingAcceptance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: DRIVER role required and driver account must be active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  value:
                    success: false
                    error_code: FORBIDDEN
                    message: Insufficient permissions
                driverInactive:
                  value:
                    success: false
                    error_code: DRIVER_INACTIVE
                    message: Driver is inactive
        '404':
          description: Booking does not exist or is not assigned to this driver
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                bookingNotFound:
                  value:
                    success: false
                    error_code: BOOKING_NOT_FOUND
                    message: Booking not found
        '409':
          description: Booking or assignment state is not acceptable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notAcceptable:
                  value:
                    success: false
                    error_code: BOOKING_NOT_ACCEPTABLE
                    message: Booking is not acceptable

  /driver/assignments/{assignmentId}/reject:
    post:
      tags: [Driver]
      summary: Reject assignment
      operationId: rejectAssignment
      parameters:
        - $ref: '#/components/parameters/AssignmentId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverAssignment'

  /driver/bookings/{bookingNumber}/start-route:
    post:
      tags: [Driver]
      summary: Start route to pickup
      description: Requires authenticated DRIVER role and an active assignment. Transitions DRIVER_ASSIGNED to ON_ROUTE through BookingStatusService.
      operationId: driverStartOnRoute
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
