        message:
          type: string

    Pagination:
      type: object
      required: [page, page_size, total, items]
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        items:
          type: array
          items: {}

    # --- Auth ---
    RegisterRequest:
      type: object
      required: [email, password, name, phone]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
        phone:
          type: string
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
        locale:
          $ref: '#/components/schemas/Locale'

    LoginRequest:
      type: object
      required: [password]
      oneOf:
        - required: [email]
        - required: [phone]
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 5
          maxLength: 30
          description: Approved driver phone login ID.
        password:
          type: string

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthTokenData:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Seconds until access token expiry

    ApiResponseAuthToken:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthTokenData'

    ApiResponseRefreshToken:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                accessToken:
                  type: string
                expiresIn:
                  type: integer

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        name:
          type: string
        phone:
          type: string
        locale:
          $ref: '#/components/schemas/Locale'
        isActive:
          type: boolean

    ApiResponseUser:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/User'

    ApiResponseHealth:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                status:
                  type: string
                version:
                  type: string
                timestamp:
                  type: string
                  format: date-time

    ApiResponseReadiness:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                status:
                  type: string
                  enum: [ready, degraded]
                timestamp:
                  type: string
                  format: date-time
                checks:
                  type: object
                  properties:
                    database:
                      type: string
                      enum: [connected, disconnected]
                    uploadDirectory:
                      type: string
                      enum: [writable, not_writable]
                integrations:
                  type: object
                  properties:
                    aviationstackConfigured:
                      type: boolean
                    flightSyncEnabled:
                      type: boolean
                    flightSyncRunning:
                      type: boolean
                    smtpConfigured:
                      type: boolean
                    firebaseConfigured:
                      type: boolean

    # --- Customer ---
    CustomerProfile:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        displayName:
          type: string
        marketingOptIn:
          type: boolean

    UpdateCustomerProfileRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        locale:
          $ref: '#/components/schemas/Locale'
        marketingOptIn:
          type: boolean

    ApiResponseCustomerProfile:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/CustomerProfile'

    NotificationDeviceRegistrationRequest:
      type: object
      required: [token, platform]
      properties:
        token:
          type: string
          minLength: 20
          maxLength: 4096
          description: FCM registration token. Never send this in URLs or logs.
        platform:
          type: string
          enum: [WEB, ANDROID, IOS]
        deviceName:
          type: string
          maxLength: 100
        appVersion:
          type: string
          maxLength: 50

    NotificationDevice:
      type: object
      properties:
        deviceId:
          type: integer
          format: int64
        platform:
          type: string
          enum: [WEB, ANDROID, IOS]
        token:
          type: string
          description: Masked token hash prefix only; raw FCM token is never returned.
        deviceName:
          type: string
          nullable: true
        appVersion:
          type: string
          nullable: true
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ApiResponseNotificationDevice:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/NotificationDevice'

    ApiResponseNotificationDeviceList:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/NotificationDevice'

