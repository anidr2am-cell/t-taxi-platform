        '409':
          $ref: '#/components/responses/QrOperationConflict'

  /driver/bookings/{bookingNumber}/arrive:
    post:
      tags: [Driver]
      summary: Mark driver arrived
      description: Requires authenticated DRIVER role and an active assignment. Transitions ON_ROUTE to DRIVER_ARRIVED through BookingStatusService.
      operationId: driverMarkArrived
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
