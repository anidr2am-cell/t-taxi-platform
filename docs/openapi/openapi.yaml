                      senderDisplayName:
                        type: string
                      text:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
                      readByCurrentUser:
                        type: boolean
                      clientMessageId:
                        type: string
                ordering:
                  type: string
                  example: newest_first
                nextCursor:
                  type: integer
                  nullable: true

    ApiResponseChatReadState:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                upToMessageId:
                  type: integer
                unreadCount:
                  type: integer
                roomId:
                  type: integer

    ApiResponseChatMessage:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ChatMessage'

    ChatMessagePagination:
      allOf:
        - $ref: '#/components/schemas/Pagination'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ChatMessage'

    ApiResponseChatMessagePagination:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ChatMessagePagination'

    ApiResponseChatFileUpload:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                messageId:
                  type: integer
                  format: int64
                file:
                  $ref: '#/components/schemas/FileAttachment'

    # --- Notification ---
    Notification:
      type: object
      properties:
        id:
          type: integer
          format: int64
        channel:
          $ref: '#/components/schemas/NotificationChannel'
        type:
          type: string
        title:
          type: string
        body:
          type: string
        isRead:
          type: boolean
        bookingId:
          type: integer
          format: int64
          nullable: true
        createdAt:
          type: string
          format: date-time

    NotificationPagination:
      allOf:
        - $ref: '#/components/schemas/Pagination'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Notification'

    ApiResponseNotificationPagination:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/NotificationPagination'

    BroadcastNotificationRequest:
      type: object
      required: [channel, title, body]
      properties:
        channel:
          $ref: '#/components/schemas/NotificationChannel'
        title:
          type: string
        body:
          type: string
        targetRole:
          $ref: '#/components/schemas/UserRole'
        payload:
          type: object

    # --- Admin ---
    DashboardStats:
      type: object
      properties:
        date:
          type: string
          format: date
        timezone:
          type: string
          example: Asia/Bangkok
        bookings:
          type: object
          properties:
            today:
              type: integer
            pending:
              type: integer
            unassigned:
              type: integer
            assigned:
              type: integer
            onRoute:
              type: integer
            arrived:
              type: integer
            completed:
              type: integer
            cancelled:
              type: integer
            noShow:
              type: integer
        drivers:
          type: object
          properties:
            online:
              type: integer
            activeJobs:
              type: integer
        settlements:
          type: object
          properties:
            pending:
              type: integer
            overdue:
              type: integer
        revenue:
          type: object
          properties:
            currency:
              type: string
              description: Currency code, or MULTIPLE when daily revenue spans multiple currencies.
            todayBooked:
              type: number
              nullable: true
            todayCompleted:
              type: number
              nullable: true
            byCurrency:
              type: array
              items:
                type: object
                properties:
                  currency:
                    type: string
                  todayBooked:
                    type: number
                  todayCompleted:
                    type: number
        updatedAt:
          type: string
          format: date-time

    ApiResponseDashboard:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DashboardStats'

    AdminNote:
      type: object
      properties:
        id:
          type: integer
          format: int64
        adminUserId:
          type: integer
          format: int64
        note:
          type: string
        isPrivate:
          type: boolean
        createdAt:
          type: string
          format: date-time

    AdminNoteCreateRequest:
      type: object
      required: [note]
      properties:
        note:
          type: string
        isPrivate:
          type: boolean
          default: true

    ApiResponseAdminNote:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AdminNote'

    ApiResponseAdminNoteList:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/AdminNote'

    AdminChatRoomSummary:
      type: object
      properties:
        roomCode:
          type: string
        bookingNumber:
          type: string
        customerName:
          type: string
        lastMessage:
          type: string
        messageCount:
          type: integer
        unreadCount:
          type: integer

    ApiResponseAdminChatList:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/AdminChatRoomSummary'

    AdminBookingUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/BookingUpdateRequest'
        - type: object
          properties:
            vehicleTypeCode:
              $ref: '#/components/schemas/VehicleType'
            customer:
              $ref: '#/components/schemas/CustomerSnapshotDto'
            adminNotes:
              type: string

    AdminUserCreateRequest:
      type: object
      required: [email, password, role, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        name:
          type: string
        phone:
          type: string

    AdminUserUpdateRequest:
      type: object
      properties:
        role:
          $ref: '#/components/schemas/UserRole'
        isActive:
          type: boolean
        name:
          type: string

    ApiResponseUserList:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/User'

    # --- Settings ---
    Setting:
      type: object
      properties:
        groupName:
          type: string
        keyName:
          type: string
        value:
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: object
        dataType:
          $ref: '#/components/schemas/SettingDataType'
        isEncrypted:
          type: boolean
        description:
          type: string

    SettingUpdateRequest:
      type: object
      required: [value, dataType]
      properties:
        value: {}
        dataType:
          $ref: '#/components/schemas/SettingDataType'

    ApiResponseSetting:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Setting'

    ApiResponseSettingsList:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Setting'

    PublicSettings:
      type: object
      properties:
        companyName:
          type: string
        supportEmail:
          type: string
        supportPhone:
          type: string

    ApiResponsePublicSettings:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PublicSettings'

    # --- Translation ---
    TranslationItem:
      type: object
      properties:
        keyName:
          type: string
        value:
          type: string

    TranslationBundle:
      type: object
      properties:
        locale:
          $ref: '#/components/schemas/Locale'
        items:
          type: array
          items:
            $ref: '#/components/schemas/TranslationItem'

    ApiResponseTranslationBundle:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/TranslationBundle'

    Translation:
      type: object
      properties:
        keyName:
          type: string
        category:
          type: string
        values:
          type: object
          additionalProperties:
            type: string

    TranslationUpsertRequest:
      type: object
      required: [keyName, values]
      properties:
        keyName:
          type: string
        category:
          type: string
        values:
          type: object
          additionalProperties:
            type: string
          example:
            ko: 예약 확인
            en: Confirm Booking

    ApiResponseTranslation:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Translation'

    ApiResponseTranslationAdminList:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Translation'

    # --- Proxy ---
    FlightEndpoint:
      type: object
      properties:
        airportCode:
          type: string
          nullable: true
        airportName:
          type: string
          nullable: true
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        estimatedAt:
          type: string
          format: date-time
          nullable: true
        actualAt:
          type: string
          format: date-time
          nullable: true
        terminal:
          type: string
          nullable: true
        gate:
          type: string
          nullable: true
    FlightStatus:
      type: string
      enum:
        - SCHEDULED
        - ACTIVE
        - LANDED
        - CANCELLED
        - DIVERTED
        - DELAYED
        - UNKNOWN
    FlightInfo:
      type: object
      properties:
        flightNumber:
          type: string
        airlineCode:
          type: string
          nullable: true
        airlineName:
          type: string
          nullable: true
        flightDate:
          type: string
          format: date
        departure:
          $ref: '#/components/schemas/FlightEndpoint'
        arrival:
          $ref: '#/components/schemas/FlightEndpoint'
        status:
          $ref: '#/components/schemas/FlightStatus'
        delayMinutes:
          type: integer
        source:
          type: string
          enum:
            - AVIATIONSTACK
        retrievedAt:
          type: string
          format: date-time

    ApiResponseFlightInfo:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/FlightInfo'

    PlacePrediction:
      type: object
      properties:
        placeId:
          type: string
        description:
          type: string

    ApiResponsePlacesAutocomplete:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                predictions:
                  type: array
                  items:
                    $ref: '#/components/schemas/PlacePrediction'

    PlaceDetails:
      type: object
      properties:
        placeId:
          type: string
        name:
          type: string
        formattedAddress:
          type: string
        lat:
          type: number
        lng:
          type: number

    ApiResponsePlaceDetails:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PlaceDetails'

    FileRecord:
      type: object
      description: Storage entity for attachments
      properties:
        id:
          type: integer
          format: int64
        entityType:
          type: string
          enum: [BOOKING, CHAT_MESSAGE, DRIVER, USER]
        entityId:
          type: integer
          format: int64
        storageProvider:
          type: string
          enum: [LOCAL, S3]
        fileUrl:
          type: string
          format: uri
        mimeType:
          type: string
        fileSize:
          type: integer
          format: int64
        originalFilename:
          type: string
        createdAt:
          type: string
          format: date-time
