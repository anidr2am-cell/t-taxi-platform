        '409':
          $ref: '#/components/responses/QrOperationConflict'

  /driver/bookings/{bookingNumber}/scan-boarding:
    post:
      tags: [Driver]
      summary: Scan boarding QR
      description: Requires authenticated DRIVER role and an active assignment. Consumes the boarding QR atomically, transitions DRIVER_ARRIVED to PICKED_UP through BookingStatusService, and activates dropoff QR state.
      operationId: driverScanBoardingQr
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverQrScanRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverBookingDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/QrOperationConflict'

  /driver/bookings/{bookingNumber}/scan-dropoff:
    post:
      tags: [Driver]
      summary: Scan dropoff QR
      description: Requires authenticated DRIVER role and an active assignment. Consumes the dropoff QR atomically and transitions PICKED_UP to COMPLETED through BookingStatusService.
      operationId: driverScanDropoffQr
      security:
        - bearerAuth: []
      parameters:
