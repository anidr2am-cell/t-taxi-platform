  /admin/translations:
    get:
      tags: [Admin]
      summary: List translations
      operationId: adminListTranslations
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTranslationAdminList'
    post:
      tags: [Admin]
      summary: Create or update translation key
      operationId: adminUpsertTranslation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranslationUpsertRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTranslation'

  /admin/notifications/broadcast:
    post:
      tags: [Admin]
      summary: Broadcast notification
      operationId: adminBroadcastNotification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BroadcastNotificationRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessEmpty'

  /admin/settings:
    get:
      tags: [Admin]
      summary: List all settings
      operationId: adminListSettings
      parameters:
        - name: group
          in: query
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSettingsList'

  /admin/settings/{group}/{key}:
    put:
      tags: [Admin]
      summary: Update setting
      operationId: adminUpdateSetting
      parameters:
        - name: group
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingUpdateRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSetting'

  /settings/public:
    get:
      tags: [Settings]
      summary: Public settings
      security: []
      operationId: getPublicSettings
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePublicSettings'

  /translations:
    get:
      tags: [Translation]
      summary: Get translations by locale
      security: []
      operationId: getTranslations
      parameters:
        - name: locale
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Locale'
        - name: category
          in: query
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTranslationBundle'

  /translations/bundle:
    get:
      tags: [Translation]
      summary: Full translation bundle for app bootstrap
      security: []
      operationId: getTranslationBundle
      parameters:
        - name: locale
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Locale'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTranslationBundle'

  /places/autocomplete:
    get:
      tags: [Proxy]
      summary: Google Places autocomplete
      security: []
      operationId: placesAutocomplete
      parameters:
        - name: input
          in: query
          required: true
          schema:
            type: string
            minLength: 2
        - name: language
          in: query
          schema:
            $ref: '#/components/schemas/Locale'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePlacesAutocomplete'
        '503':
          $ref: '#/components/responses/GooglePlaceNotFound'

  /places/details:
    get:
      tags: [Proxy]
      summary: Google Place details
      security: []
      operationId: placesDetails
      parameters:
        - name: placeId
          in: query
          required: true
          schema:
            type: string
        - name: language
          in: query
          schema:
            $ref: '#/components/schemas/Locale'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePlaceDetails'
        '404':
          $ref: '#/components/responses/GooglePlaceNotFound'

  /flights:
    get:
      tags: [Proxy]
      summary: Flight lookup (AviationStack)
      security: []
      operationId: getFlight
      parameters:
        - name: flightNumber
          in: query
          required: true
          schema:
            type: string
          example: KE651
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFlightInfo'
        '404':
          $ref: '#/components/responses/FlightNotFound'

  /public/flights/search:
    get:
      tags: [Proxy]
      summary: Public flight lookup for booking wizard
      security: []
      operationId: searchPublicFlights
      parameters:
        - name: flightNumber
          in: query
          required: true
          schema:
            type: string
          example: TG409
        - name: flightDate
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-07-01'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFlightInfo'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/FlightNotFound'
        '429':
          $ref: '#/components/responses/FlightProviderError'
        '502':
          $ref: '#/components/responses/FlightProviderError'
        '503':
          $ref: '#/components/responses/FlightProviderError'
        '504':
          $ref: '#/components/responses/FlightProviderError'

  /public/bookings/lookup:
    post:
      tags: [Booking]
      summary: Guest booking lookup
      description: >
        Public lookup for guests using booking number and the exact booking phone
        number after formatting normalization. Returns a sanitized booking summary
        and a short-lived guest access token for existing customer booking actions.
        Raw QR tokens, QR hashes, user IDs, emails, commission data, internal notes,
        and activity logs are never returned.
      security: []
      operationId: lookupGuestBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuestBookingLookupRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGuestBookingLookup'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimit'

  /driver-applications:
    post:
      tags: [Driver]
      summary: Submit driver registration application
      description: >
        Public intake endpoint for prospective drivers. Creates only a
        driver_applications row; users and drivers are created later by admin
        approval. The status token is returned only in this response.
      security: []
      operationId: submitDriverApplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverApplicationCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DriverApplicationMultipartRequest'
      responses:
        '201':
          description: Driver application submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverApplicationSubmit'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/DuplicateError'
        '429':
          $ref: '#/components/responses/RateLimit'

  /driver-applications/status:
    get:
      tags: [Driver]
      summary: Check driver application status
      security: []
      operationId: getDriverApplicationStatus
      parameters:
        - name: applicationNumber
          in: query
          required: true
          schema:
            type: string
            pattern: '^DA[0-9A-F]{14}$'
        - name: token
          in: query
          required: true
          schema:
            type: string
            minLength: 32
            maxLength: 128
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverApplicationStatus'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimit'

  /driver-applications/{applicationNumber}/resubmit:
    post:
      tags: [Driver]
      summary: Resubmit rejected driver application
      security: []
      operationId: resubmitDriverApplication
      parameters:
        - name: applicationNumber
          in: path
          required: true
          schema:
            type: string
            pattern: '^DA[0-9A-F]{14}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/DriverApplicationCreateRequest'
                - type: object
                  required: [token]
                  properties:
                    token:
                      type: string
                      minLength: 32
                      maxLength: 128
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/DriverApplicationMultipartRequest'
                - type: object
                  required: [token]
                  properties:
                    token:
                      type: string
                      minLength: 32
                      maxLength: 128
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverApplicationSubmit'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/DuplicateError'
        '422':
          $ref: '#/components/responses/InvalidStatusTransition'
        '429':
          $ref: '#/components/responses/RateLimit'

  /admin/driver-applications:
    get:
      tags: [Admin]
      summary: List driver registration applications
      operationId: adminListDriverApplications
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/DriverApplicationStatus'
        - name: countryCode
          in: query
          schema:
            type: string
            minLength: 2
            maxLength: 2
        - name: vehicleTypeCode
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverApplicationAdminList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/driver-applications/{id}:
    get:
      tags: [Admin]
      summary: Get driver application detail
      operationId: adminGetDriverApplication
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverApplicationAdminDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/driver-applications/{id}/approve:
    post:
      tags: [Admin]
      summary: Approve driver application and create driver account
      operationId: adminApproveDriverApplication
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverApplicationApproveRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverApplicationApprove'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/DuplicateError'
        '422':
          $ref: '#/components/responses/InvalidStatusTransition'

  /admin/driver-applications/{id}/reject:
    post:
      tags: [Admin]
      summary: Reject driver application
      operationId: adminRejectDriverApplication
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverApplicationRejectRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverApplicationReject'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/InvalidStatusTransition'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token. Obtain via /auth/login or /auth/register.
    guestBookingAccess:
      type: apiKey
      in: query
      name: guestAccessToken
      description: Guest booking access token with email query param.
    guestReviewAccessHeader:
      type: apiKey
      in: header
      name: X-Guest-Access-Token
      description: Guest booking access token for review lookup. Never send in URL query parameters.

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    BookingNumber:
      name: bookingNumber
      in: path
      required: true
      schema:
        type: string
        pattern: '^TX[0-9]{12}$'
      example: TX202607010001
    RoomCode:
      name: roomCode
      in: path
      required: true
      schema:
        type: string
      example: room_TX202607010001
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

  responses:
    SuccessEmpty:
      description: Success with no data payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseEmpty'
          examples:
            ok:
              value:
                success: true
                message: OK
                data: null
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validation:
              value:
                success: false
                error_code: VALIDATION_ERROR
                message: Validation failed
                errors:
                  - field: email
                    message: Invalid email format
    Unauthorized:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              value:
                success: false
                error_code: UNAUTHORIZED
                message: Invalid or expired token
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            forbidden:
              value:
                success: false
                error_code: FORBIDDEN
                message: Access denied
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            notFound:
              value:
                success: false
                error_code: NOT_FOUND
                message: Resource not found
    InvalidStatusTransition:
      description: Booking status transition not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalid:
              value:
                success: false
                error_code: INVALID_STATUS_TRANSITION
                message: Cannot transition from COMPLETED to CONFIRMED
    QrOperationConflict:
      description: QR operation rejected
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidTransition:
              value:
                success: false
                error_code: INVALID_STATUS_TRANSITION
                message: Invalid booking status transition
            usedToken:
              value:
                success: false
                error_code: QR_TOKEN_ALREADY_USED
                message: QR token has already been used
    DuplicateError:
      description: Duplicate resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            duplicate:
              value:
                success: false
                error_code: DUPLICATE_BOOKING
                message: Email already registered
    DuplicateBooking:
      description: Duplicate booking conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    VehicleNotSelectable:
      description: Vehicle type not selectable for recommendation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            vehicle:
              value:
                success: false
                error_code: VALIDATION_ERROR
                message: Vehicle SEDAN is not selectable
    BookingNotAccessible:
      description: Booking access denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            denied:
              value:
                success: false
                error_code: FORBIDDEN
                message: Booking not accessible
    RateLimit:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            limited:
              value:
                success: false
                error_code: RATE_LIMIT
                message: Too many requests
    DriverNotAvailable:
      description: Driver not available for assignment
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    FlightNotFound:
      description: Flight not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            flight:
              value:
                success: false
                error_code: FLIGHT_NOT_FOUND
                message: Flight KE651 not found for date
    FlightProviderError:
      description: Flight provider error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            provider:
              value:
                success: false
                error_code: FLIGHT_PROVIDER_ERROR
                message: Flight provider error
    GooglePlaceNotFound:
      description: Google Places API error or place not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            place:
              value:
                success: false
                error_code: GOOGLE_PLACE_NOT_FOUND
                message: Place not found
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            internal:
              value:
                success: false
                error_code: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred

  examples:
    BookingRequestAirportPickup:
      value:
        serviceTypeCode: AIRPORT_PICKUP
        scheduledPickupAt: '2026-07-01T14:00:00+07:00'
        origin:
          address: Suvarnabhumi Airport
          placeId: ChIJb0QyKc6Z4jARl4i16m2h5sE
          lat: 13.69
          lng: 100.75
        destination:
          address: Centric Sea Pattaya
          placeId: ChIJexample
          lat: 12.93
          lng: 100.88
        transfer:
          airportIata: BKK
          flightNumber: KE651
          flightScheduledArrivalAt: '2026-07-01T13:30:00+07:00'
          flightEstimatedArrivalAt: '2026-07-01T13:45:00+07:00'
          delayMinutes: 15
        passengers:
          adults: 2
          children: 0
          infants: 0
        luggage:
          carriers20Inch: 1
          carriers24InchPlus: 0
          golfBags: 0
        vehicleTypeCode: SUV
        vehicleCount: 1
        options:
          nameSign: true
        customer:
          name: Kim
          email: kim@example.com
          phone: '+821012345678'
          countryCode: KR
        specialRequests: Child seat please

  schemas:
    # --- Enums ---
    ReservationStatus:
      type: string
      enum:
        - PENDING
        - CONFIRMED
        - DRIVER_ASSIGNED
        - ON_ROUTE
        - DRIVER_ARRIVED
        - PICKED_UP
        - COMPLETED
        - CANCELLED
        - NO_SHOW
    VehicleType:
      type: string
      enum:
        - SEDAN
        - SUV
        - VIP_SUV
        - VAN
        - VIP_VAN
        - LUXURY
    ServiceType:
      type: string
      enum:
        - AIRPORT_PICKUP
        - AIRPORT_DROPOFF
        - CITY_TRANSFER
        - GOLF_TRANSFER
    UserRole:
      type: string
      enum:
        - CUSTOMER
        - DRIVER
        - ADMIN
        - SUPER_ADMIN
    PaymentStatus:
      type: string
      enum:
        - UNPAID
        - PENDING
        - PAID
        - REFUNDED
        - FAILED
    NotificationChannel:
      type: string
      enum:
        - PUSH
        - EMAIL
        - SMS
    ChatMessageStatus:
      type: string
      enum:
        - SENT
        - DELIVERED
        - READ
    ChatMessageType:
      type: string
      enum:
        - TEXT
        - IMAGE
        - FILE
        - SYSTEM
    ChargeType:
      type: string
      enum:
        - VEHICLE_BASE
        - NAME_SIGN
        - NIGHT_SURCHARGE
        - AIRPORT_SURCHARGE
        - TOLL_GATE
        - PROMOTION
        - COUPON
        - DRIVER_EXTRA
        - SEASON_SURCHARGE
        - HOLIDAY_SURCHARGE
        - WAITING_CHARGE
        - OTHER
    Locale:
      type: string
      enum:
        - ko
        - en
        - th
        - ja
        - zh
    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - UNAUTHORIZED
        - FORBIDDEN
        - NOT_FOUND
        - INVALID_STATUS_TRANSITION
        - DUPLICATE_BOOKING
        - FLIGHT_NOT_FOUND
        - GOOGLE_PLACE_NOT_FOUND
        - INTERNAL_SERVER_ERROR
        - AUTH_REQUIRED
        - AUTH_INVALID
        - VEHICLE_NOT_SELECTABLE
        - DRIVER_NOT_AVAILABLE
        - BOOKING_NOT_ACCESSIBLE
        - BOOKING_NOT_FOUND
        - BOOKING_NOT_ACCEPTABLE
        - DRIVER_INACTIVE
        - RATE_LIMIT
        - EXTERNAL_API_ERROR
        - INVALID_FLIGHT_NUMBER
        - INVALID_FLIGHT_DATE
        - FLIGHT_PROVIDER_NOT_CONFIGURED
        - FLIGHT_PROVIDER_TIMEOUT
        - FLIGHT_PROVIDER_RATE_LIMITED
        - FLIGHT_PROVIDER_ERROR
        - INVALID_QR_TOKEN
        - QR_TOKEN_EXPIRED
        - QR_TOKEN_ALREADY_USED
        - QR_TOKEN_TYPE_MISMATCH
        - QR_TOKEN_BOOKING_MISMATCH
    SettingDataType:
      type: string
      enum:
        - STRING
        - NUMBER
        - BOOLEAN
        - JSON
    DriverStatus:
      type: string
      enum:
        - AVAILABLE
        - ON_TRIP
        - OFFLINE
        - SUSPENDED
    AssignmentStatus:
      type: string
      enum:
        - ASSIGNED
        - ACCEPTED
        - REJECTED
        - COMPLETED
        - CANCELLED
    ActivityType:
      type: string
      enum:
        - BOOKING_CREATED
        - BOOKING_UPDATED
        - BOOKING_CANCELLED
        - STATUS_CHANGED
        - DRIVER_ASSIGNED
        - DRIVER_UNASSIGNED
        - DRIVER_CHANGED
        - DRIVER_BOOKING_ACCEPTED
        - CHARGE_ADDED
        - CHARGE_REMOVED
        - CHAT_STARTED
        - CHAT_MESSAGE_SENT
        - BOOKING_COMPLETED
        - PAYMENT_UPDATED
        - NOTE_ADDED

    # --- Core wrappers ---
    ApiResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string
        data: {}

    ApiResponseEmpty:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              nullable: true

    ErrorResponse:
      type: object
      required: [success, error_code, message]
