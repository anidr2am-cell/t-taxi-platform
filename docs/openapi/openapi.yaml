        - BOOKING_UPDATED
        - BOOKING_CANCELLED
        - STATUS_CHANGED
        - DRIVER_ASSIGNED
        - DRIVER_UNASSIGNED
        - DRIVER_CHANGED
        - CHARGE_ADDED
        - CHARGE_REMOVED
        - CHAT_STARTED
        - CHAT_MESSAGE_SENT
        - BOOKING_COMPLETED
        - PAYMENT_UPDATED
        - NOTE_ADDED

    # --- Core wrappers ---
    ApiResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string
        data: {}

    ApiResponseEmpty:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              nullable: true

    ErrorResponse:
      type: object
      required: [success, error_code, message]
      properties:
        success:
          type: boolean
          const: false
        error_code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
