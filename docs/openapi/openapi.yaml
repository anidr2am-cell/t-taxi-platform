        '503':
          $ref: '#/components/responses/FlightProviderError'
        '504':
          $ref: '#/components/responses/FlightProviderError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token. Obtain via /auth/login or /auth/register.
    guestBookingAccess:
      type: apiKey
      in: query
      name: guestAccessToken
      description: Guest booking access token with email query param.

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    BookingNumber:
      name: bookingNumber
      in: path
      required: true
      schema:
        type: string
        pattern: '^TX[0-9]{14}$'
      example: TX202607010001
    RoomCode:
      name: roomCode
      in: path
      required: true
      schema:
        type: string
      example: room_TX202607010001
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

  responses:
    SuccessEmpty:
      description: Success with no data payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseEmpty'
          examples:
            ok:
              value:
                success: true
                message: OK
                data: null
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validation:
              value:
                success: false
                error_code: VALIDATION_ERROR
                message: Validation failed
                errors:
                  - field: email
                    message: Invalid email format
    Unauthorized:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              value:
                success: false
                error_code: UNAUTHORIZED
                message: Invalid or expired token
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            forbidden:
              value:
                success: false
                error_code: FORBIDDEN
                message: Access denied
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            notFound:
              value:
                success: false
                error_code: NOT_FOUND
                message: Resource not found
    InvalidStatusTransition:
      description: Booking status transition not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalid:
              value:
                success: false
                error_code: INVALID_STATUS_TRANSITION
                message: Cannot transition from COMPLETED to CONFIRMED
    DuplicateError:
      description: Duplicate resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            duplicate:
              value:
                success: false
                error_code: DUPLICATE_BOOKING
                message: Email already registered
    DuplicateBooking:
      description: Duplicate booking conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    VehicleNotSelectable:
      description: Vehicle type not selectable for recommendation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            vehicle:
              value:
                success: false
                error_code: VALIDATION_ERROR
                message: Vehicle SEDAN is not selectable
    BookingNotAccessible:
      description: Booking access denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            denied:
              value:
                success: false
                error_code: FORBIDDEN
                message: Booking not accessible
    DriverNotAvailable:
      description: Driver not available for assignment
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    FlightNotFound:
      description: Flight not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            flight:
              value:
                success: false
                error_code: FLIGHT_NOT_FOUND
                message: Flight KE651 not found for date
    FlightProviderError:
      description: Flight provider error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            provider:
              value:
                success: false
                error_code: FLIGHT_PROVIDER_ERROR
                message: Flight provider error
    GooglePlaceNotFound:
      description: Google Places API error or place not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            place:
              value:
                success: false
                error_code: GOOGLE_PLACE_NOT_FOUND
                message: Place not found
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            internal:
              value:
                success: false
                error_code: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred

  examples:
    BookingRequestAirportPickup:
      value:
        serviceTypeCode: AIRPORT_PICKUP
        scheduledPickupAt: '2026-07-01T14:00:00+07:00'
        origin:
          address: Suvarnabhumi Airport
          placeId: ChIJb0QyKc6Z4jARl4i16m2h5sE
          lat: 13.69
          lng: 100.75
        destination:
          address: Centric Sea Pattaya
          placeId: ChIJexample
          lat: 12.93
          lng: 100.88
        transfer:
          airportIata: BKK
          flightNumber: KE651
          flightScheduledArrivalAt: '2026-07-01T13:30:00+07:00'
          flightEstimatedArrivalAt: '2026-07-01T13:45:00+07:00'
          delayMinutes: 15
        passengers:
          adults: 2
          children: 0
          infants: 0
        luggage:
          carriers20Inch: 1
          carriers24InchPlus: 0
          golfBags: 0
        vehicleTypeCode: SUV
        vehicleCount: 1
        options:
          nameSign: true
        customer:
          name: Kim
          email: kim@example.com
          phone: '+821012345678'
          countryCode: KR
        specialRequests: Child seat please

  schemas:
    # --- Enums ---
    ReservationStatus:
      type: string
      enum:
        - PENDING
        - CONFIRMED
        - DRIVER_ASSIGNED
        - DRIVER_ARRIVED
        - PICKED_UP
        - COMPLETED
        - CANCELLED
        - NO_SHOW
    VehicleType:
      type: string
      enum:
        - SEDAN
        - SUV
        - VIP_SUV
        - VAN
        - VIP_VAN
        - LUXURY
    ServiceType:
      type: string
      enum:
        - AIRPORT_PICKUP
        - AIRPORT_DROPOFF
        - CITY_TRANSFER
        - GOLF_TRANSFER
    UserRole:
      type: string
      enum:
        - CUSTOMER
        - DRIVER
        - ADMIN
        - SUPER_ADMIN
    PaymentStatus:
      type: string
      enum:
        - UNPAID
        - PENDING
        - PAID
        - REFUNDED
        - FAILED
    NotificationChannel:
      type: string
      enum:
        - PUSH
        - EMAIL
        - SMS
    ChatMessageStatus:
      type: string
      enum:
        - SENT
        - DELIVERED
        - READ
    ChatMessageType:
      type: string
      enum:
        - TEXT
        - IMAGE
        - FILE
        - SYSTEM
    ChargeType:
      type: string
      enum:
        - VEHICLE_BASE
        - NAME_SIGN
        - NIGHT_SURCHARGE
        - AIRPORT_PARKING
        - TOLL_GATE
        - PROMOTION
        - COUPON
        - DRIVER_EXTRA
        - SEASON_SURCHARGE
        - HOLIDAY_SURCHARGE
        - OTHER
    Locale:
      type: string
      enum:
        - ko
        - en
        - th
        - ja
        - zh
    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - UNAUTHORIZED
        - FORBIDDEN
        - NOT_FOUND
