        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/QrOperationConflict'

  /driver/bookings/{bookingNumber}/complete:
    post:
      tags: [Driver]
      summary: Complete trip
      description: Requires authenticated DRIVER role and an active assignment. Transitions DRIVER_ARRIVED to COMPLETED through BookingStatusService.
      operationId: driverCompleteTrip
      security:
        - bearerAuth: []
