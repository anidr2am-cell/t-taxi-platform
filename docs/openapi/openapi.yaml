openapi: 3.1.0
info:
  title: TTaxi Platform API
  version: 1.0.0
  description: |
    Thailand Travel Platform — Airport Transfer & future travel services.
    Aligns with Database Design v1.1 and API Contract v1.0.
    Base path `/api/v1`. JWT Bearer authentication.
  contact:
    name: TTaxi API Support
    email: support@ttaxi.com

jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base

servers:
  - url: https://api.ttaxi.com/api/v1
    description: Production
  - url: http://localhost:3000/api/v1
    description: Local development

tags:
  - name: Authentication
    description: Register, login, token refresh
  - name: Customer
    description: Customer profile and bookings
  - name: Booking
    description: Reservations, pricing, vehicle recommendation
  - name: Driver
    description: Driver app — assignments, location, status
  - name: Vehicle
    description: Vehicle types and pricing
  - name: Airport
    description: Airport master data
  - name: Golf
    description: Golf courses and regions
  - name: Chat
    description: Chat rooms and messages
  - name: Notification
    description: Push and in-app notifications
  - name: Admin
    description: Admin panel operations
  - name: Settings
    description: Public and admin settings
  - name: Translation
    description: i18n bundles
  - name: Proxy
    description: Google Places and flight lookup proxies
  - name: Health
    description: Service health check

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns API availability and version. No authentication required.
      security: []
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseHealth'
              examples:
                ok:
                  value:
                    success: true
                    message: OK
                    data:
                      status: ok
                      version: 1.0.0
                      timestamp: '2026-07-01T10:00:00+07:00'

  /auth/register:
    post:
      tags: [Authentication]
      summary: Register customer
      description: Create a new CUSTOMER account and return JWT tokens.
      security: []
      operationId: authRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              default:
                value:
                  email: user@example.com
                  password: secret123
                  name: Kim Traveler
                  phone: '+821012345678'
                  countryCode: KR
                  locale: ko
      responses:
        '201':
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthToken'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/DuplicateError'

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login
      description: Authenticate Customer, Driver, or Admin and return JWT tokens.
      security: []
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              customer:
                value:
                  email: user@example.com
                  password: secret123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthToken'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token
      security: []
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRefreshToken'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Logout
      description: Invalidate refresh token session.
      operationId: authLogout
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessEmpty'

  /auth/me:
    get:
      tags: [Authentication]
      summary: Get current user
      operationId: authMe
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /customer/profile:
    get:
      tags: [Customer]
      summary: Get customer profile
      operationId: getCustomerProfile
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCustomerProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      tags: [Customer]
      summary: Update customer profile
      operationId: updateCustomerProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerProfileRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCustomerProfile'
        '400':
          $ref: '#/components/responses/ValidationError'

  /customer/bookings:
    get:
      tags: [Customer]
      summary: List my bookings
      operationId: listCustomerBookings
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ReservationStatus'
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingSummaryPagination'

  /customer/fcm-token:
    post:
      tags: [Customer]
      summary: Register FCM token
      operationId: registerCustomerFcmToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FcmTokenRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessEmpty'

  /bookings/vehicle/recommend:
    post:
      tags: [Booking]
      summary: Recommend vehicle
      description: Calculate recommended vehicle type from passengers and luggage (PRD rules).
      security: []
      operationId: recommendVehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleRecommendationRequest'
            examples:
              family:
                value:
                  adults: 2
                  children: 1
                  infants: 0
                  carriers20Inch: 2
                  carriers24InchPlus: 1
                  golfBags: 0
      responses:
        '200':
          description: Recommendation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVehicleRecommendation'
              examples:
                suv:
                  value:
                    success: true
                    message: OK
                    data:
                      recommendedVehicleType: SUV
                      vehicleCount: 1
                      multiVehicle: false
                      assignments:
                        - vehicleType: SUV
                          count: 1
                      selectableVehicleTypes:
                        - SUV
                        - VIP_SUV
                        - VAN
        '400':
          $ref: '#/components/responses/ValidationError'

  /bookings/pricing/calculate:
    post:
      tags: [Booking]
      summary: Calculate booking price
      description: Preview charge line items and total before creating booking.
      security: []
      operationId: calculateBookingPrice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PricingCalculateRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePricingResult'
        '422':
          $ref: '#/components/responses/VehicleNotSelectable'

  /bookings:
    post:
      tags: [Booking]
      summary: Create booking
      description: |
        Creates booking, charge items, chat room, activity log.
        Server generates `bookingNumber` (TXYYYYMMDD0001). Client must not generate it.
      security: []
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
            examples:
              airportPickup:
                $ref: '#/components/examples/BookingRequestAirportPickup'
      responses:
        '201':
          description: Booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingCreated'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/DuplicateBooking'
        '422':
          $ref: '#/components/responses/VehicleNotSelectable'
    get:
      tags: [Booking]
      summary: List bookings
      description: Scoped by role — Customer own, Driver assigned, Admin all.
      operationId: listBookings
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            type: string
          description: Single or comma-separated ReservationStatus
        - name: serviceTypeCode
          in: query
          schema:
            $ref: '#/components/schemas/ServiceType'
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          schema:
            type: string
            format: date
        - name: customerEmail
          in: query
          schema:
            type: string
            format: email
          description: Admin only
        - name: driverId
          in: query
          schema:
            type: integer
            format: int64
          description: Admin only
        - name: search
          in: query
          schema:
            type: string
          description: Admin — bookingNumber, name, phone
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingSummaryPagination'

  /bookings/{bookingNumber}:
    get:
      tags: [Booking]
      summary: Get booking detail
      operationId: getBooking
      security:
        - bearerAuth: []
        - guestBookingAccess: []
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
        - name: email
          in: query
          schema:
            type: string
            format: email
          description: Guest access
        - name: guestAccessToken
          in: query
          schema:
            type: string
          description: Guest access token from create response
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingResponse'
        '403':
          $ref: '#/components/responses/BookingNotAccessible'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Booking]
      summary: Update booking
      description: Limited fields. Customer only when PENDING; Admin broader access.
      operationId: updateBooking
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingUpdateRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingResponse'
        '409':
          $ref: '#/components/responses/InvalidStatusTransition'

  /bookings/{bookingNumber}/cancel:
    post:
      tags: [Booking]
      summary: Cancel booking
      operationId: cancelBooking
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelBookingRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingResponse'
        '409':
          $ref: '#/components/responses/InvalidStatusTransition'

  /bookings/{bookingNumber}/status:
    patch:
      tags: [Booking]
      summary: Change booking status
      description: State machine enforced. See ReservationStatus transitions in API docs.
      operationId: changeBookingStatus
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingStatusChangeRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingResponse'
        '409':
          $ref: '#/components/responses/InvalidStatusTransition'

  /bookings/{bookingNumber}/charges:
    get:
      tags: [Booking]
      summary: Get charge line items
      operationId: getBookingCharges
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseChargeItems'
    post:
      tags: [Booking]
      summary: Add charge line item
      description: Admin only — toll, driver extra, etc.
      operationId: addBookingCharge
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChargeItemCreateRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseChargeItemCreated'

  /bookings/{bookingNumber}/activity-logs:
    get:
      tags: [Booking]
      summary: Get booking activity logs
      description: Admin only — CS audit trail.
      operationId: getBookingActivityLogs
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseActivityLogList'

  /bookings/{bookingNumber}/status-logs:
    get:
      tags: [Booking]
      summary: Get status change history
      operationId: getBookingStatusLogs
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStatusLogList'

  /driver/online:
    post:
      tags: [Driver]
      summary: Set driver online
      operationId: driverOnline
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                isOnline:
                  type: boolean
                  const: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverStatus'

  /driver/offline:
    post:
      tags: [Driver]
      summary: Set driver offline
      operationId: driverOffline
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                isOnline:
                  type: boolean
                  const: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverStatus'

  /driver/location:
    post:
      tags: [Driver]
      summary: Send driver location
      description: Heartbeat recommended every 10–30 seconds.
      operationId: driverLocation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverLocationRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessEmpty'

  /driver/assignments:
    get:
      tags: [Driver]
      summary: List driver assignments
      operationId: listDriverAssignments
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            type: string
            default: active
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverAssignmentPagination'

  /driver/bookings/today:
    get:
      tags: [Driver]
      summary: List today's assigned driver bookings
      description: Returns active bookings assigned to the authenticated DRIVER for the current Thailand service day.
      operationId: driverListTodayBookings
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverJobsToday'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /driver/bookings/{bookingNumber}:
    get:
      tags: [Driver]
      summary: Get assigned driver booking detail
      description: The authenticated DRIVER may only access active bookings assigned to that driver.
      operationId: driverGetBookingDetail
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverBookingDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /driver/assignments/{assignmentId}/accept:
    post:
      tags: [Driver]
      summary: Accept assignment
      operationId: acceptAssignment
      parameters:
        - $ref: '#/components/parameters/AssignmentId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverAssignment'

  /driver/assignments/{assignmentId}/reject:
    post:
      tags: [Driver]
      summary: Reject assignment
      operationId: rejectAssignment
      parameters:
        - $ref: '#/components/parameters/AssignmentId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDriverAssignment'

  /driver/bookings/{bookingNumber}/arrived:
    post:
      tags: [Driver]
      summary: Mark driver arrived
      description: Transitions booking to DRIVER_ARRIVED.
      operationId: driverArrived
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingResponse'

  /driver/bookings/{bookingNumber}/picked-up:
    post:
      tags: [Driver]
      summary: Mark picked up
      operationId: driverPickedUp
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingResponse'

  /driver/bookings/{bookingNumber}/complete:
    post:
      tags: [Driver]
      summary: Complete booking
      operationId: driverComplete
      parameters:
        - $ref: '#/components/parameters/BookingNumber'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingResponse'

  /vehicles/types:
    get:
      tags: [Vehicle]
      summary: List vehicle types
      security: []
      operationId: listVehicleTypes
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVehicleTypeList'

  /vehicles/prices:
    get:
      tags: [Vehicle]
      summary: List default vehicle prices
      security: []
      operationId: listVehiclePrices
      parameters:
        - name: serviceTypeCode
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/ServiceType'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVehiclePriceList'

  /airports:
    get:
      tags: [Airport]
      summary: List airports
      security: []
      operationId: listAirports
      parameters:
        - name: isActive
          in: query
          schema:
            type: boolean
            default: true
        - name: countryCode
          in: query
          schema:
            type: string
            minLength: 2
            maxLength: 2
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAirportList'

  /airports/{iataCode}:
    get:
      tags: [Airport]
      summary: Get airport by IATA
      security: []
      operationId: getAirport
      parameters:
        - name: iataCode
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Z]{3}$'
          example: BKK
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAirport'
        '404':
          $ref: '#/components/responses/NotFound'

  /golf-courses:
    get:
      tags: [Golf]
      summary: List golf courses
      security: []
      operationId: listGolfCourses
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: region
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGolfCoursePagination'

  /golf-regions:
    get:
      tags: [Golf]
      summary: List golf regions
      security: []
      operationId: listGolfRegions
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseStringList'

  /chat/rooms/{roomCode}:
    get:
      tags: [Chat]
      summary: Get chat room
      operationId: getChatRoom
      parameters:
        - $ref: '#/components/parameters/RoomCode'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseChatRoom'
        '404':
          $ref: '#/components/responses/NotFound'

  /chat/rooms:
    post:
      tags: [Chat]
      summary: Create chat room
      description: Normally auto-created on booking. Admin recovery use.
      operationId: createChatRoom
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [bookingNumber]
              properties:
                bookingNumber:
                  type: string
                  pattern: '^TX[0-9]{14}$'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseChatRoom'

  /chat/rooms/{roomCode}/messages:
    get:
      tags: [Chat]
      summary: List chat messages
      operationId: listChatMessages
      parameters:
        - $ref: '#/components/parameters/RoomCode'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: beforeId
          in: query
          schema:
            type: integer
            format: int64
          description: Cursor for pagination
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseChatMessagePagination'
    post:
      tags: [Chat]
      summary: Send message (REST fallback)
      operationId: sendChatMessage
      parameters:
        - $ref: '#/components/parameters/RoomCode'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatMessageSendRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseChatMessage'

  /chat/rooms/{roomCode}/read:
    post:
      tags: [Chat]
      summary: Mark messages as read
      operationId: markChatRead
      parameters:
        - $ref: '#/components/parameters/RoomCode'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                lastReadMessageId:
                  type: integer
                  format: int64
      responses:
        '200':
          $ref: '#/components/responses/SuccessEmpty'

  /chat/rooms/{roomCode}/files:
    post:
      tags: [Chat]
      summary: Upload chat file
      operationId: uploadChatFile
      parameters:
        - $ref: '#/components/parameters/RoomCode'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                replyMessageId:
                  type: integer
                  format: int64
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseChatFileUpload'
        '400':
          $ref: '#/components/responses/ValidationError'

  /notifications:
    get:
      tags: [Notification]
      summary: List notifications
      operationId: listNotifications
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
