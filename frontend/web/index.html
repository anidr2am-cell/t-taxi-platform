<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Thailand Airport Transfer - Book airport pickup, dropoff, city and golf transfers">
  <meta name="theme-color" content="#087F7A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="T-Ride">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>T-Ride</title>
  <script>
    (function () {
      const isDriverRoute =
        window.location.pathname === '/driver' ||
        window.location.pathname.startsWith('/driver/');
      const manifestLink = document.createElement('link');
      manifestLink.id = 'app-manifest';
      manifestLink.rel = 'manifest';
      manifestLink.href = isDriverRoute ? '/manifest-driver.json' : '/manifest.json';
      document.head.appendChild(manifestLink);
    })();
  </script>
</head>
<body>
  <script>
    (function () {
      let deferredPwaInstallPrompt = null;
      let pwaInstalled = false;
      let listenerId = 0;
      const listeners = new Map();
      const debugPwaInstall = true;

      function logPwaInstall(message, detail) {
        if (!debugPwaInstall || !window.console) return;
        if (detail === undefined) {
          console.debug('[T-Ride PWA]', message);
        } else {
          console.debug('[T-Ride PWA]', message, detail);
        }
      }

      function notifyPwaListeners() {
        listeners.forEach((listener) => {
          try {
            listener();
          } catch (_) {
            // Keep one listener failure from breaking the Flutter bridge.
          }
        });
      }

      window.addEventListener('beforeinstallprompt', (event) => {
        logPwaInstall('beforeinstallprompt fired');
        event.preventDefault();
        deferredPwaInstallPrompt = event;
        logPwaInstall('deferred prompt stored');
        window.dispatchEvent(new CustomEvent('tride-pwa-install-available'));
        notifyPwaListeners();
      });

      window.addEventListener('appinstalled', () => {
        logPwaInstall('appinstalled fired');
        pwaInstalled = true;
        deferredPwaInstallPrompt = null;
        window.dispatchEvent(new CustomEvent('tride-pwa-installed'));
        notifyPwaListeners();
      });

      window.tridePwaIsSupported = function () {
        return typeof window !== 'undefined' && typeof window.matchMedia === 'function';
      };

      window.tridePwaIsStandalone = function () {
        const standaloneDisplay = window.matchMedia &&
          window.matchMedia('(display-mode: standalone)').matches;
        const iosStandalone = window.navigator && window.navigator.standalone === true;
        const androidReferrer = typeof document.referrer === 'string' &&
          document.referrer.startsWith('android-app://');
        return Boolean(standaloneDisplay || iosStandalone || androidReferrer);
      };

      window.tridePwaIsInstalled = function () {
        return Boolean(pwaInstalled || window.tridePwaIsStandalone());
      };

      window.tridePwaCanInstall = function () {
        const result = Boolean(deferredPwaInstallPrompt && !window.tridePwaIsInstalled());
        logPwaInstall('tridePwaCanInstall result', result);
        return result;
      };

      window.tridePwaIsIos = function () {
        const platform = (navigator.platform || '').toLowerCase();
        const userAgent = (navigator.userAgent || '').toLowerCase();
        const touchMac = platform === 'macintel' && navigator.maxTouchPoints > 1;
        return /iphone|ipad|ipod/.test(userAgent) || touchMac;
      };

      window.tridePwaIsInAppBrowser = function () {
        const userAgent = (navigator.userAgent || '').toLowerCase();
        return /kakaotalk|line\/|fbav|fb_iab|instagram|naver|daumapps|wv;|; wv\)/.test(userAgent);
      };

      window.tridePwaPromptInstall = async function () {
        if (window.tridePwaIsInstalled()) return 'alreadyInstalled';
        if (!deferredPwaInstallPrompt) return 'unavailable';

        const promptEvent = deferredPwaInstallPrompt;
        deferredPwaInstallPrompt = null;
        notifyPwaListeners();

        try {
          logPwaInstall('prompt invoked');
          await promptEvent.prompt();
          const choice = await promptEvent.userChoice;
          logPwaInstall('userChoice result', choice && choice.outcome);
          return choice && choice.outcome === 'accepted' ? 'accepted' : 'dismissed';
        } catch (_) {
          return 'error';
        } finally {
          notifyPwaListeners();
        }
      };

      window.tridePwaSubscribe = function (listener) {
        listenerId += 1;
        listeners.set(listenerId, listener);
        logPwaInstall('Flutter subscribed', listenerId);
        return listenerId;
      };

      window.tridePwaUnsubscribe = function (id) {
        listeners.delete(Number(id));
      };

      window.tridePwaTryCloseWindow = function () {
        try {
          window.close();
          return true;
        } catch (_) {
          return false;
        }
      };
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
