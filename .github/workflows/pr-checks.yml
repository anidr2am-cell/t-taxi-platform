name: PR Checks

on:
  pull_request:

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      JWT_ACCESS_SECRET: test-access-secret-value
      JWT_REFRESH_SECRET: test-refresh-secret-value
      DB_USER: test
      DB_NAME: ttaxi_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
        # Backend suite uses in-memory/mocked repositories and stubs.
        # Real MySQL is not required for `npm test`, so no service container is added.

  frontend-test:
    name: Frontend Flutter tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Matches local tooling (Flutter 3.41.6 / Dart 3.11.4) and pubspec sdk ^3.11.4
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter tests
        run: flutter test

  frontend-web-build:
    name: Frontend web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (verification only)
        run: flutter build web --release --no-wasm-dry-run
