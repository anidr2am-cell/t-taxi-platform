name: Staging Settlement Lifecycle E2E

"on":
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-shared-driver-e2e
  cancel-in-progress: false

jobs:
  settlement-lifecycle-e2e:
    name: Run staging settlement lifecycle E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging-e2e
    env:
      NODE_PATH: ${{ github.workspace }}/backend/node_modules
      TRIDE_E2E_TARGET: staging
      TRIDE_E2E_FRONTEND_URL: https://trider.taxi
      TRIDE_E2E_BACKEND_URL: https://trider.taxi
      TRIDE_E2E_ALLOW_SPLIT_HOSTS: "0"
      TRIDE_E2E_ALLOW_LIVE: "1"
      TRIDE_E2E_KEEP_FIXTURE: "0"
      TRIDE_E2E_ARTIFACT_DIR: ${{ github.workspace }}/e2e-artifacts
      TRIDE_E2E_ADMIN_EMAIL: ${{ secrets.TRIDE_E2E_ADMIN_EMAIL }}
      TRIDE_E2E_ADMIN_PASSWORD: ${{ secrets.TRIDE_E2E_ADMIN_PASSWORD }}
      TRIDE_E2E_DRIVER_EMAIL: ${{ secrets.TRIDE_E2E_DRIVER_EMAIL }}
      TRIDE_E2E_DRIVER_PASSWORD: ${{ secrets.TRIDE_E2E_DRIVER_PASSWORD }}
      TRIDE_E2E_DRIVER_ID: ${{ secrets.TRIDE_E2E_DRIVER_ID }}
      TRIDE_E2E_CUSTOMER_PHONE: ${{ secrets.TRIDE_E2E_CUSTOMER_PHONE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Verify required staging E2E secrets
        shell: bash
        run: |
          missing=0
          for name in \
            TRIDE_E2E_ADMIN_EMAIL \
            TRIDE_E2E_ADMIN_PASSWORD \
            TRIDE_E2E_DRIVER_EMAIL \
            TRIDE_E2E_DRIVER_PASSWORD \
            TRIDE_E2E_DRIVER_ID \
            TRIDE_E2E_CUSTOMER_PHONE
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is not configured"
              missing=1
            fi
          done
          exit "$missing"

      - name: Run settlement E2E tool tests
        working-directory: backend
        run: npm run test:settlement-e2e-tools

      - name: Run staging settlement E2E dry-run without logging secrets
        working-directory: backend
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/tride-e2e"
          npm run e2e:staging:settlement:dry-run > "$RUNNER_TEMP/tride-e2e/dry-run.json"
          node <<'NODE'
          const fs = require('node:fs');
          const text = fs.readFileSync(`${process.env.RUNNER_TEMP}/tride-e2e/dry-run.json`, 'utf8');
          const start = text.indexOf('{');
          const dryRun = JSON.parse(text.slice(start));
          console.log(JSON.stringify({
            dryRun: dryRun.dryRun === true,
            target: dryRun.target,
            frontendHost: dryRun.frontendHost,
            backendHost: dryRun.backendHost,
            marker: dryRun.marker,
            expectedCommissionAmount: dryRun.expectedCommissionAmount,
            expectedCurrency: dryRun.expectedCurrency,
          }));
          NODE
          rm -f "$RUNNER_TEMP/tride-e2e/dry-run.json"

      - name: Check staging health
        shell: bash
        run: |
          curl --fail --silent --show-error --output /dev/null https://trider.taxi/api/v1/health
          curl --fail --silent --show-error --output /dev/null https://trider.taxi/

      - name: Run live staging settlement lifecycle E2E
        working-directory: backend
        run: npm run e2e:staging:settlement

      - name: Verify redacted settlement E2E manifest exists
        if: always()
        shell: bash
        run: |
          manifest="$TRIDE_E2E_ARTIFACT_DIR/settlement-lifecycle-e2e-manifest.json"
          if [ ! -f "$manifest" ]; then
            echo "::error::Expected redacted settlement E2E manifest was not created"
            exit 1
          fi
          if [ ! -s "$manifest" ]; then
            echo "::error::Expected redacted settlement E2E manifest is empty"
            exit 1
          fi

      - name: Validate redacted settlement E2E manifest schema
        if: always()
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const manifestPath = path.join(
            process.env.TRIDE_E2E_ARTIFACT_DIR,
            'settlement-lifecycle-e2e-manifest.json',
          );
          const allowed = new Set([
            'runId',
            'bookingNumber',
            'settlementStatus',
            'receiptStatus',
            'approvalStatus',
            'approvalCandidateVerified',
            'bookingFinalStatus',
            'preparationStatus',
            'preparationError',
            'cleanupStatus',
            'cleanupError',
          ]);
          const forbidden = new Set([
            'guestAccess' + 'Token',
            'adminToken',
            'driverToken',
            'password',
            'customerPhone',
            'receiptUrl',
            'receiptURL',
            'storagePath',
            'authori' + 'zation',
            'cookie',
            'headers',
            'rawReceiptBytes',
          ]);
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          if (!Array.isArray(manifest)) {
            console.error('::error::Redacted settlement E2E manifest must be an array');
            process.exit(1);
          }
          const findings = [];
          manifest.forEach((entry, index) => {
            for (const key of Object.keys(entry || {})) {
              if (!allowed.has(key) || forbidden.has(key)) {
                findings.push(`entry ${index} field ${key}`);
              }
            }
            if (entry.approvalCandidateVerified !== true) {
              findings.push(`entry ${index} approval candidate was not verified`);
            }
            if (entry.bookingFinalStatus !== 'COMPLETED') {
              findings.push(`entry ${index} booking was not completed`);
            }
            if (entry.settlementStatus !== 'APPROVED') {
              findings.push(`entry ${index} settlement was not approved`);
            }
            if (entry.cleanupStatus !== 'archived') {
              findings.push(`entry ${index} fixture was not archived`);
            }
          });
          if (findings.length) {
            for (const finding of findings) {
              console.error(`::error::Unexpected redacted settlement manifest state: ${finding}`);
            }
            process.exit(1);
          }
          console.log('Redacted settlement E2E manifest schema validation passed');
          NODE

      - name: Scan redacted settlement E2E artifacts for secret-like values
        if: always()
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const root = process.env.TRIDE_E2E_ARTIFACT_DIR;
          const patterns = [
            ['authori' + 'zation-bearer', new RegExp('Authori' + 'zation: ' + 'Bearer ' + '[A-Za-z0-9._-]+')],
            ['guest-access-token-assignment', new RegExp('guestAccess' + 'Token\\s*[=:]\\s*[A-Za-z0-9._-]+')],
            ['e2e-admin-password-name', /TRIDE_E2E_ADMIN_PASSWORD/],
            ['e2e-driver-password-name', /TRIDE_E2E_DRIVER_PASSWORD/],
            ['customer-phone-field', /customerPhone/],
            ['receipt-url-field', /receiptUrl|receiptURL|signedUrl|signedURL/],
            ['storage-path-field', /storagePath|\/srv\/tride\/uploads|\\\\uploads\\\\/],
            ['raw-receipt-bytes-field', /rawReceiptBytes|E2E TEST RECEIPT/],
            ['private-key', /BEGIN .*PRIVATE KEY/],
            ['google-api-key', /AIza[0-9A-Za-z_-]{20,}/],
          ];
          const findings = [];
          const walk = (dir) => {
            if (!fs.existsSync(dir)) return;
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                walk(full);
              } else if (entry.isFile()) {
                const text = fs.readFileSync(full, 'utf8');
                for (const [name, pattern] of patterns) {
                  if (pattern.test(text)) {
                    findings.push({ file: path.relative(root, full), pattern: name });
                  }
                }
              }
            }
          };
          walk(root);
          if (findings.length > 0) {
            for (const finding of findings) {
              console.error(`::error::Secret-like artifact content detected in ${finding.file} (${finding.pattern})`);
            }
            process.exit(1);
          }
          console.log('Settlement E2E artifact secret scan passed');
          NODE

      - name: Write safe settlement E2E summary
        if: always()
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const manifestPath = path.join(
            process.env.TRIDE_E2E_ARTIFACT_DIR,
            'settlement-lifecycle-e2e-manifest.json',
          );
          const summary = process.env.GITHUB_STEP_SUMMARY;
          const lines = ['## Staging settlement lifecycle E2E', ''];
          if (fs.existsSync(manifestPath)) {
            const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            const completed = manifest.filter((item) => item.bookingFinalStatus === 'COMPLETED').length;
            const approved = manifest.filter((item) => item.settlementStatus === 'APPROVED').length;
            const verified = manifest.filter((item) => item.approvalCandidateVerified === true).length;
            const archived = manifest.filter((item) => item.cleanupStatus === 'archived').length;
            const cleanupFailures = manifest.filter((item) => item.cleanupStatus === 'failed' || item.cleanupError).length;
            lines.push(`- Fixtures: ${manifest.length}`);
            lines.push(`- Approval candidates verified: ${verified}`);
            lines.push(`- Completed bookings: ${completed}`);
            lines.push(`- Approved settlements: ${approved}`);
            lines.push(`- Archived fixtures: ${archived}`);
            lines.push(`- Cleanup failures: ${cleanupFailures}`);
          } else {
            lines.push('- No redacted manifest was created.');
          }
          lines.push('- Artifact type: redacted fixture manifest only');
          fs.appendFileSync(summary, `${lines.join('\n')}\n`);
          NODE

      - name: Upload redacted settlement E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-settlement-lifecycle-e2e-redacted
          path: ${{ github.workspace }}/e2e-artifacts/settlement-lifecycle-e2e-manifest.json
          if-no-files-found: error
          retention-days: 7
